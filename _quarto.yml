project:
  type: website
  render:
    - "*.ipynb"

format:
  html:
    toc: true
    toc-depth: 5
    css: styles.css
    page-layout: full
    code-block-bg: true
    code-overflow: wrap
    code-line-numbers: false
    monofont: D2Coding
    language:
      crossref-tbl-title: "표"

website:
  title: "Frontend Book"
  site-url: https://frontendbook.madebykim.kr/
  sidebar:
    style: "docked"
    search: true
    contents:
      - "index.ipynb"
      - section: "Core"
        contents:
          - section: "HTML"
            contents:
              - "core/html/html.ipynb"
          - section: "CSS"
            contents:
              - "core/css/css.ipynb"
          - section: "Node.js"
            contents:
              - "core/node/npm_basic.ipynb"
              - "core/node/package.json.ipynb"
              - "core/node/node.ipynb"
              - "core/node/module.ipynb"
          - section: "자바스크립트"
            contents:
              - "core/js/js_type.ipynb"
              - "core/js/js_statement.ipynb"
              - "core/js/js_event.ipynb"
          - section: "타입스크립트"
            contents:
              - "core/ts/tsconfig.ipynb"
              - "core/ts/tsc.ipynb"
              - "core/ts/ts_packages.ipynb"
              - "core/ts/tsc_watch.ipynb"
          - section: "HTTP"
            contents:
              - "core/http/http.ipynb"
      - section: "Applications"
        contents:
          - section: "gsap"
            contents:
              - "applications/gsap/gsap.ipynb"
              - "applications/gsap/gsap_code.ipynb"
          - section: "Konva"
            contents:
              - "applications/konva/konva.ipynb"
